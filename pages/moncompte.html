<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon compte - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold">ModeStyle</a>
            <div class="flex items-center gap-4">
                <a href="../index.html" class="hover:text-green-200">
                    <i class="fas fa-home"></i> Accueil
                </a>
                <a href="cart.html" class="hover:text-green-200 relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">Mon compte</h1>
        
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="border-b">
                <div class="flex overflow-x-auto">
                    <button id="tabProfile" class="tab-btn px-6 py-3 font-semibold bg-green-700 text-white">Profil</button>
                    <button id="tabAddress" class="tab-btn px-6 py-3 font-semibold text-gray-600 hover:bg-gray-100">Adresse</button>
                    <button id="TabPassword" class="tab-btn px-6 py-3 font-semibold text-gray-600 hover:bg-gray-100">Mot de passe</button>
                </div>
            </div>
            
            <div class="p-6">
                <!-- Onglet Profil -->
                <div id="profileTab" class="tab-content">
                    <form id="profileForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Nom complet</label>
                            <input type="text" id="name" required 
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="email" required disabled
                                   class="w-full px-4 py-2 border rounded-lg bg-gray-100">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Téléphone</label>
                            <input type="tel" id="phone" 
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <button type="submit" class="bg-green-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-800 transition">
                            <i class="fas fa-save"></i> Mettre à jour
                        </button>
                    </form>
                </div>
                
                <!-- Onglet Adresse -->
                <div id="addressTab" class="tab-content hidden">
                    <form id="addressForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Rue / Quartier</label>
                            <input type="text" id="street" 
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Ville</label>
                            <input type="text" id="city" 
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Quartier / District</label>
                            <input type="text" id="district" 
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <button type="submit" class="bg-green-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-800 transition">
                            <i class="fas fa-save"></i> Enregistrer l'adresse
                        </button>
                    </form>
                </div>
                
                <!-- Onglet Mot de passe -->
                <div id="passwordTab" class="tab-content hidden">
                    <form id="passwordForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Nouveau mot de passe</label>
                            <input type="password" id="newPassword" required minlength="6"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Confirmer le mot de passe</label>
                            <input type="password" id="confirmPassword" required
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        
                        <button type="submit" class="bg-green-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-800 transition">
                            <i class="fas fa-key"></i> Changer le mot de passe
                        </button>
                    </form>
                </div>
                
                <div id="successMsg" class="mt-4 text-green-600 text-sm hidden"></div>
                <div id="errorMsg" class="mt-4 text-red-600 text-sm hidden"></div>
            </div>
        </div>
        
        <div class="mt-6 text-center">
            <a href="commandes.html" class="text-green-600 hover:underline mr-4">
                <i class="fas fa-box"></i> Mes commandes
            </a>
            <a href="favoris.html" class="text-green-600 hover:underline">
                <i class="fas fa-heart"></i> Mes favoris
            </a>
        </div>
    </div>
</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
// Vérifier l'authentification
if (!isLoggedIn()) {
    window.location.href = 'login.html';
}

let currentUser = null;

async function loadUserProfile() {
    try {
        currentUser = await getCurrentUser();
        document.getElementById('name').value = currentUser.name || '';
        document.getElementById('email').value = currentUser.email || '';
        document.getElementById('phone').value = currentUser.phone || '';
        
        if (currentUser.address) {
            document.getElementById('street').value = currentUser.address.street || '';
            document.getElementById('city').value = currentUser.address.city || '';
            document.getElementById('district').value = currentUser.address.district || '';
        }
    } catch (error) {
        showToast(error.message, true);
    }
}

// Onglets
function initTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const tabId = tab.id;
            
            tabs.forEach(t => {
                t.classList.remove('bg-green-700', 'text-white');
                t.classList.add('text-gray-600', 'hover:bg-gray-100');
            });
            tab.classList.add('bg-green-700', 'text-white');
            tab.classList.remove('text-gray-600', 'hover:bg-gray-100');
            
            contents.forEach(content => content.classList.add('hidden'));
            
            if (tabId === 'tabProfile') document.getElementById('profileTab').classList.remove('hidden');
            if (tabId === 'tabAddress') document.getElementById('addressTab').classList.remove('hidden');
            if (tabId === 'TabPassword') document.getElementById('passwordTab').classList.remove('hidden');
        });
    });
}

// Mise à jour du profil
document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const profileData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value
    };
    
    try {
        const updated = await updateProfile(profileData);
        showToast('Profil mis à jour avec succès');
        
        // Mettre à jour l'utilisateur dans localStorage
        const user = getCurrentUser();
        user.name = updated.name;
        user.phone = updated.phone;
        setCurrentUser(user);
        
    } catch (error) {
        showToast(error.message, true);
    }
});

// Mise à jour de l'adresse
document.getElementById('addressForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const addressData = {
        address: {
            street: document.getElementById('street').value,
            city: document.getElementById('city').value,
            district: document.getElementById('district').value
        }
    };
    
    try {
        await updateProfile(addressData);
        showToast('Adresse mise à jour avec succès');
    } catch (error) {
        showToast(error.message, true);
    }
});

// Changement de mot de passe
document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (newPassword !== confirmPassword) {
        showToast('Les mots de passe ne correspondent pas', true);
        return;
    }
    
    if (newPassword.length < 6) {
        showToast('Le mot de passe doit contenir au moins 6 caractères', true);
        return;
    }
    
    try {
        await updateProfile({ password: newPassword });
        showToast('Mot de passe changé avec succès');
        document.getElementById('passwordForm').reset();
    } catch (error) {
        showToast(error.message, true);
    }
});

function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `fixed bottom-4 right-4 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-4 py-2 rounded-lg shadow-lg text-sm toast-slide`;
    toast.classList.remove('hidden');
    setTimeout(() => {
        toast.classList.add('hidden');
    }, 3000);
}

// Initialisation
document.addEventListener('DOMContentLoaded', () => {
    initTabs();
    loadUserProfile();
    loadCart();
});
</script>
</body>
</html>
