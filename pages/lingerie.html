<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingerie - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-bold">ModeStyle</a>
            <div class="hidden md:flex items-center gap-6">
                <a href="../index.html" class="hover:text-green-200">Accueil</a>
                <a href="vetements.html" class="hover:text-green-200">Vêtements</a>
                <a href="chaussures.html" class="hover:text-green-200">Chaussures</a>
                <a href="accessoires.html" class="hover:text-green-200">Accessoires</a>
                <a href="lingerie.html" class="text-yellow-300 font-semibold">Lingerie</a>
                <a href="promos.html" class="hover:text-green-200">Promos</a>
                <a href="nouveautes.html" class="hover:text-green-200">Nouveautés</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="relative hover:text-green-200">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
                <a href="favoris.html" class="hover:text-green-200">
                    <i class="far fa-heart text-xl"></i>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">💗 Lingerie</h1>
    <p class="text-gray-500 mb-8">Découvrez notre collection de lingerie fine et confortable</p>

    <!-- Filtres -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <select id="sizeFilter" class="px-3 py-2 border rounded-lg">
                <option value="all">Toutes tailles</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
            <input type="text" id="searchFilter" placeholder="Rechercher..." class="px-3 py-2 border rounded-lg flex-1">
            <button id="resetFilters" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Réinitialiser</button>
        </div>
    </div>

    <!-- Produits Lingerie -->
    <div id="lingerieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
</main>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
const lingerie = [
    { id: "lin_001", name: "Ensemble dentelle noir", price: 15000, oldPrice: 25000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: true, isPromo: true },
    { id: "lin_002", name: "Soutien-gorge push-up", price: 8000, oldPrice: null, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: true, isPromo: false },
    { id: "lin_003", name: "String en dentelle", price: 5000, oldPrice: 8000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: false, isPromo: true },
    { id: "lin_004", name: "Nuissette soie", price: 25000, oldPrice: 40000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L"], isNew: true, isPromo: true },
    { id: "lin_005", name: "Shorty coton", price: 6000, oldPrice: null, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: false, isPromo: false },
    { id: "lin_006", name: "Ensemble lingerie rouge", price: 18000, oldPrice: 28000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: true, isPromo: true },
    { id: "lin_007", name: "Body dentelle", price: 12000, oldPrice: null, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: true, isPromo: false },
    { id: "lin_008", name: "Culotte taille haute", price: 7000, oldPrice: 10000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: false, isPromo: true },
    { id: "lin_009", name: "Bralette confort", price: 9000, oldPrice: null, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L","XL"], isNew: true, isPromo: false },
    { id: "lin_010", name: "Ensemble nuisette", price: 22000, oldPrice: 35000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", sizes: ["S","M","L"], isNew: true, isPromo: true }
];

let filteredLingerie = [...lingerie];

function displayLingerie(products) {
    const container = document.getElementById('lingerieGrid');
    if (!products.length) {
        container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">📭 Aucun produit trouvé</div>';
        return;
    }
    
    container.innerHTML = products.map(p => `
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition group">
            <a href="product-details.html?id=${p.id}">
                <img src="${p.image}" class="w-full h-40 object-cover group-hover:scale-105 transition duration-300">
            </a>
            <div class="p-3">
                <h3 class="font-semibold text-gray-800 text-sm truncate">${p.name}</h3>
                <div class="flex items-center gap-2 mt-1">
                    ${p.oldPrice ? `<span class="text-gray-400 line-through text-xs">${p.oldPrice.toLocaleString()} FCFA</span>` : ''}
                    <p class="text-green-600 font-bold text-sm">${p.price.toLocaleString()} FCFA</p>
                </div>
                <div class="flex gap-2 mt-2">
                    <button onclick="addToCartUI('${p.id}', '${p.name}', ${p.price}, 1, '', '', '${p.image}')" 
                            class="flex-1 bg-green-600 text-white py-1.5 rounded-lg hover:bg-green-700 transition text-xs">
                        <i class="fas fa-shopping-cart"></i> Acheter
                    </button>
                    <button onclick="toggleFavorite('${p.id}', '${p.name}', ${p.price}, '${p.image}')" 
                            class="favorite-btn text-gray-400 hover:text-red-500 p-1.5 border rounded-lg">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function applyFilters() {
    const search = document.getElementById('searchFilter').value.toLowerCase();
    let filtered = [...lingerie];
    if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
    displayLingerie(filtered);
}

function toggleFavorite(id, name, price, image) {
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const exists = favorites.find(f => f.id === id);
    if (exists) {
        favorites = favorites.filter(f => f.id !== id);
        showToast("❌ Retiré des favoris");
    } else {
        favorites.push({ id, name, price, image });
        showToast("❤️ Ajouté aux favoris");
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    updateFavCount();
}

function showToast(message) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'fixed bottom-4 right-4 z-50 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm';
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

function updateFavCount() {
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const count = favorites.length;
    const favSpan = document.getElementById('favCount');
    if (favSpan) {
        favSpan.textContent = count;
        favSpan.classList.toggle('hidden', count === 0);
    }
}

document.getElementById('searchFilter').addEventListener('input', applyFilters);
document.getElementById('resetFilters').addEventListener('click', () => {
    document.getElementById('sizeFilter').value = 'all';
    document.getElementById('searchFilter').value = '';
    applyFilters();
});

displayLingerie(lingerie);
updateFavCount();
</script>

<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>
</body>
</html>
