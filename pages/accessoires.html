<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessoires - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href            <a href="../index.html" class="text-2xl font-bold">ModeStyle</a>
            <div class="hidden md:flex items-center gap-6">
                <a href="../index.html" class="hover:text-green-200">Accueil</a>
                <a href="vetements.html" class="hover:text-green-200">Vêtements</a>
                <a href="chaussures.html" class="hover:text-green-200">Chaussures</a>
                <a href="accessoires.html" class="text-yellow-300 font-semibold">Accessoires</a>
                <a href="lingerie.html" class="hover:text-green-200">Lingerie</a>
                <a href="promos.html" class="hover:text-green-200">Promos</a>
                <a href="nouveautes.html" class="hover:text-green-200">Nouveautés</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="relative hover:text-green-200">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
                <a href="favoris.html" class="hover:text-green-200">
                    <i class="far fa-heart text-xl"></i>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">💼 Accessoires</h1>
    <p class="text-gray-500 mb-8">Complétez votre look avec nos accessoires tendance</p>

    <!-- Filtres -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <select id="genderFilter" class="px-3 py-2 border rounded-lg">
                <option value="all">Tous</option>
                <option value="homme">Homme</option>
                <option value="femme">Femme</option>
                <option value="mixte">Mixte</option>
            </select>
            <input type="text" id="searchFilter" placeholder="Rechercher un accessoire..." class="px-3 py-2 border rounded-lg flex-1">
            <button id="resetFilters" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Réinitialiser</button>
        </div>
    </div>

    <!-- Produits Accessoires -->
    <div id="accessoiresGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
</main>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
const accessoires = [
    { id: "acc_001", name: "Montre connectée", price: 45000, oldPrice: 60000, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400", gender: "mixte", isNew: true, isPromo: true },
    { id: "acc_002", name: "Sac à main cuir", price: 35000, oldPrice: null, image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400", gender: "femme", isNew: true, isPromo: false },
    { id: "acc_003", name: "Lunettes de soleil", price: 15000, oldPrice: 25000, image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400", gender: "mixte", isNew: false, isPromo: true },
    { id: "acc_004", name: "Ceinture en cuir homme", price: 12000, oldPrice: null, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400", gender: "homme", isNew: true, isPromo: false },
    { id: "acc_005", name: "Portefeuille homme", price: 10000, oldPrice: 15000, image: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=400", gender: "homme", isNew: false, isPromo: true },
    { id: "acc_006", name: "Chapeau panama", price: 8000, oldPrice: null, image: "https://images.unsplash.com/photo-1521369909029-2afed882baee?w=400", gender: "mixte", isNew: true, isPromo: false },
    { id: "acc_007", name: "Écharpe cachemire", price: 18000, oldPrice: 28000, image: "https://images.unsplash.com/photo-1520903928021-81e5d7f5128a?w=400", gender: "femme", isNew: true, isPromo: true },
    { id: "acc_008", name: "Casquette tendance", price: 7000, oldPrice: null, image: "https://images.unsplash.com/photo-1588850571404-5d85b6b0c7d9?w=400", gender: "homme", isNew: false, isPromo: false },
    { id: "acc_009", name: "Bracelet argent", price: 25000, oldPrice: 35000, image: "https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=400", gender: "femme", isNew: true, isPromo: true },
    { id: "acc_010", name: "Cravate homme", price: 9000, oldPrice: null, image: "https://images.unsplash.com/photo-1589756823695-278bc923f962?w=400", gender: "homme", isNew: false, isPromo: false },
    { id: "acc_011", name: "Montre classique", price: 35000, oldPrice: 50000, image: "https://images.unsplash.com/photo-1524805444758-089113d48a6d?w=400", gender: "homme", isNew: true, isPromo: true },
    { id: "acc_012", name: "Collier femme", price: 12000, oldPrice: null, image: "https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=400", gender: "femme", isNew: true, isPromo: false },
    { id: "acc_013", name: "Sac à dos", price: 28000, oldPrice: 40000, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400", gender: "mixte", isNew: false, isPromo: true },
    { id: "acc_014", name: "Gants hiver", price: 10000, oldPrice: null, image: "https://images.unsplash.com/photo-1520903928021-81e5d7f5128a?w=400", gender: "mixte", isNew: false, isPromo: false },
    { id: "acc_015", name: "Pochette soirée", price: 15000, oldPrice: 22000, image: "https://images.unsplash.com/photo-1566150905907-1d7d6e6f6b6f?w=400", gender: "femme", isNew: true, isPromo: true }
];

let filteredAccessoires = [...accessoires];

function displayAccessoires(products) {
    const container = document.getElementById('accessoiresGrid');
    if (!products.length) {
        container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">📭 Aucun accessoire trouvé</div>';
        return;
    }
    
    container.innerHTML = products.map(p => `
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition group">
            <a href="product-details.html?id=${p.id}">
                <img src="${p.image}" class="w-full h-40 object-cover group-hover:scale-105 transition duration-300">
            </a>
            <div class="p-3">
                <h3 class="font-semibold text-gray-800 text-sm truncate">${p.name}</h3>
                <div class="flex items-center gap-2 mt-1">
                    ${p.oldPrice ? `<span class="text-gray-400 line-through text-xs">${p.oldPrice.toLocaleString()} FCFA</span>` : ''}
                    <p class="text-green-600 font-bold text-sm">${p.price.toLocaleString()} FCFA</p>
                </div>
                <div class="flex gap-2 mt-2">
                    <button onclick="addToCartUI('${p.id}', '${p.name}', ${p.price}, 1, '', '', '${p.image}')" 
                            class="flex-1 bg-green-600 text-white py-1.5 rounded-lg hover:bg-green-700 transition text-xs">
                        <i class="fas fa-shopping-cart"></i> Acheter
                    </button>
                    <button onclick="toggleFavorite('${p.id}', '${p.name}', ${p.price}, '${p.image}')" 
                            class="favorite-btn text-gray-400 hover:text-red-500 p-1.5 border rounded-lg">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function applyFilters() {
    const gender = document.getElementById('genderFilter').value;
    const search = document.getElementById('searchFilter').value.toLowerCase();
    
    let filtered = [...accessoires];
    if (gender !== 'all') filtered = filtered.filter(p => p.gender === gender);
    if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
    
    displayAccessoires(filtered);
}

function toggleFavorite(id, name, price, image) {
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const exists = favorites.find(f => f.id === id);
    if (exists) {
        favorites = favorites.filter(f => f.id !== id);
        showToast("❌ Retiré des favoris");
    } else {
        favorites.push({ id, name, price, image });
        showToast("❤️ Ajouté aux favoris");
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    updateFavCount();
}

function showToast(message) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'fixed bottom-4 right-4 z-50 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm';
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

function updateFavCount() {
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const count = favorites.length;
    const favSpan = document.getElementById('favCount');
    if (favSpan) {
        favSpan.textContent = count;
        favSpan.classList.toggle('hidden', count === 0);
    }
}

document.getElementById('genderFilter').addEventListener('change', applyFilters);
document.getElementById('searchFilter').addEventListener('input', applyFilters);
document.getElementById('resetFilters').addEventListener('click', () => {
    document.getElementById('genderFilter').value = 'all';
    document.getElementById('searchFilter').value = '';
    applyFilters();
});

displayAccessoires(accessoires);
updateFavCount();
</script>

<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>
</body>
</html>
