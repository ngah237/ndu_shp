<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold">ModeStyle</a>
            <a href="../index.html" class="hover:text-green-200">
                <i class="fas fa-home"></i> Accueil
            </a>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-green-700 px-6 py-4">
            <h1 class="text-white text-2xl font-bold text-center">Inscription</h1>
        </div>
        
        <div class="p-6">
            <form id="registerForm">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Nom complet</label>
                    <input type="text" id="name" required 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Email</label>
                    <input type="email" id="email" required 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Téléphone</label>
                    <input type="tel" id="phone" 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Mot de passe</label>
                    <input type="password" id="password" required minlength="6"
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" required
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <button type="submit" class="w-full bg-green-700 text-white py-2 rounded-lg font-semibold hover:bg-green-800 transition">
                    S'inscrire
                </button>
            </form>
            
            <div id="errorMsg" class="mt-4 text-red-600 text-center text-sm hidden"></div>
            
            <p class="mt-6 text-center text-gray-600">
                Déjà un compte ? 
                <a href="login.html" class="text-green-700 font-semibold hover:underline">Se connecter</a>
            </p>
        </div>
    </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    redirectIfLoggedIn();
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        
        if (password !== confirmPassword) {
            errorMsg.textContent = 'Les mots de passe ne correspondent pas';
            errorMsg.classList.remove('hidden');
            return;
        }
        
        if (password.length < 6) {
            errorMsg.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
            errorMsg.classList.remove('hidden');
            return;
        }
        
        try {
            const user = await register({ name, email, phone, password });
            setCurrentUser(user);
            window.location.href = '../index.html';
        } catch (error) {
            errorMsg.textContent = error.message;
            errorMsg.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
