<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveautés - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-bold">ModeStyle</a>
            <div class="hidden md:flex items-center gap-6">
                <a href="../index.html" class="hover:text-green-200">Accueil</a>
                <a href="vetements.html" class="hover:text-green-200">Vêtements</a>
                <a href="chaussures.html" class="hover:text-green-200">Chaussures</a>
                <a href="accessoires.html" class="hover:text-green-200">Accessoires</a>
                <a href="lingerie.html" class="hover:text-green-200">Lingerie</a>
                <a href="promos.html" class="hover:text-green-200">Promos</a>
                <a href="nouveautes.html" class="text-yellow-300 font-semibold">Nouveautés</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="relative hover:text-green-200">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
                <a href="favoris.html" class="hover:text-green-200">
                    <i class="far fa-heart text-xl"></i>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">✨ Nouveautés</h1>
    <p class="text-gray-500 mb-8">Découvrez les derniers produits arrivés dans notre boutique</p>

    <!-- Produits Nouveautés -->
    <div id="nouveautesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
</main>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
const nouveautes = [
    { id: "new_001", name: "T-shirt homme coton bio", price: 10000, oldPrice: null, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400", category: "homme", isNew: true },
    { id: "new_002", name: "Robe longue femme", price: 25000, oldPrice: 35000, image: "https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=400", category: "femme", isNew: true, isPromo: true },
    { id: "new_003", name: "Basket running homme", price: 25000, oldPrice: 35000, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400", category: "chaussures", isNew: true, isPromo: true },
    { id: "new_004", name: "Montre connectée", price: 45000, oldPrice: 60000, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400", category: "accessoires", isNew: true, isPromo: true },
    { id: "new_005", name: "Ensemble lingerie dentelle", price: 15000, oldPrice: 25000, image: "https://images.unsplash.com/photo-1620916566392-39f1143ab5be?w=400", category: "lingerie", isNew: true, isPromo: true },
    { id: "new_006", name: "Veste en cuir homme", price: 55000, oldPrice: 75000, image: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400", category: "homme", isNew: true, isPromo: true },
    { id: "new_007", name: "Sac à main cuir", price: 35000, oldPrice: null, image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400", category: "accessoires", isNew: true },
    { id: "new_008", name: "Pull oversize femme", price: 22000, oldPrice: null, image: "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400", category: "femme", isNew: true },
    { id: "new_009", name: "Basket style homme", price: 28000, oldPrice: 38000, image: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=400", category: "chaussures", isNew: true, isPromo: true },
    { id: "new_010", name: "Ensemble jogging enfant", price: 18000, oldPrice: null, image: "https://images.unsplash.com/photo-1519238263530-99bdd11df2ea?w=400", category: "enfant", isNew: true }
];

function displayNouveautes() {
    const container = document.getElementById('nouveautesGrid');
    container.innerHTML = nouveautes.map(p => `
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition group">
            <div class="relative">
                <span class="absolute top-2 left-2 bg-blue-500 text-white text-xs px-2 py-1 rounded-full">Nouveau</span>
                <a href="product-details.html?id=${p.id}">
                    <img src="${p.image}" class="w-full h-40 object-cover group-hover:scale-105 transition duration-300">
                </a>
            </div>
            <div class="p-3">
                <h3 class="font-semibold text-gray-800 text-sm truncate">${p.name}</h3>
                <div class="flex items-center gap-2 mt-1">
                    ${p.oldPrice ? `<span class="text-gray-400 line-through text-xs">${p.oldPrice.toLocaleString()} FCFA</span>` : ''}
                    <p class="text-green-600 font-bold text-sm">${p.price.toLocaleString()} FCFA</p>
                </div>
                <div class="flex gap-2 mt-2">
                    <button onclick="addToCartUI('${p.id}', '${p.name}', ${p.price}, 1, '', '', '${p.image}')" 
                            class="flex-1 bg-green-600 text-white py-1.5 rounded-lg hover:bg-green-700 transition text-xs">
                        <i class="fas fa-shopping-cart"></i> Acheter
                    </button>
                    <button onclick="toggleFavorite('${p.id}', '${p.name}', ${p.price}, '${p.image}')" 
                            class="favorite-btn text-gray-400 hover:text-red-500 p-1.5 border rounded-lg">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function toggleFavorite(id, name, price, image) {
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const exists = favorites.find(f => f.id === id);
    if (exists) {
        favorites = favorites.filter(f => f.id !== id);
        showToast("❌ Retiré des favoris");
    } else {
        favorites.push({ id, name, price, image });
        showToast("❤️ Ajouté aux favoris");
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    updateFavCount();
}

function showToast(message) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'fixed bottom-4 right-4 z-50 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm';
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

function updateFavCount() {
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const count = favorites.length;
    const favSpan = document.getElementById('favCount');
    if (favSpan) {
        favSpan.textContent = count;
        favSpan.classList.toggle('hidden', count === 0);
    }
}

displayNouveautes();
updateFavCount();
</script>

<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>
</body>
</html>
