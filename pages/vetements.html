function displayProducts(containerId, products) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    container.innerHTML = products.map(p => `
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition group">
            <a href="product-details.html?id=${p.id}">
                <img src="${p.image}" alt="${p.name}" class="w-full h-40 object-cover group-hover:scale-105 transition duration-300">
            </a>
            <div class="p-3">
                <h3 class="font-semibold text-gray-800 text-sm truncate">${p.name}</h3>
                <div class="flex items-center gap-2 mt-1">
                    ${p.oldPrice ? `<span class="text-gray-400 line-through text-xs">${p.oldPrice.toLocaleString()} FCFA</span>` : ''}
                    <p class="text-green-600 font-bold text-sm">${p.price.toLocaleString()} FCFA</p>
                </div>
                <div class="flex gap-2 mt-2">
                    <button onclick="addToCartUI('${p.id}', '${p.name}', ${p.price}, 1, '', '', '${p.image}')" 
                            class="flex-1 bg-green-600 text-white py-1.5 rounded-lg hover:bg-green-700 transition text-xs">
                        <i class="fas fa-shopping-cart"></i> Acheter
                    </button>
                    <button onclick="toggleFavorite('${p.id}', '${p.name}', ${p.price}, '${p.image}')" 
                            class="favorite-btn text-gray-400 hover:text-red-500 p-1.5 border rounded-lg">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function toggleFavorite(id, name, price, image) {
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const exists = favorites.find(f => f.id === id);
    if (exists) {
        favorites = favorites.filter(f => f.id !== id);
        showToast("❌ Retiré des favoris");
    } else {
        favorites.push({ id, name, price, image });
        showToast("❤️ Ajouté aux favoris");
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    updateFavCount();
}

function showToast(message) {
    const toast = document.getElementById('toast') || (() => {
        const div = document.createElement('div');
        div.id = 'toast';
        div.className = 'fixed bottom-4 right-4 z-50 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm';
        document.body.appendChild(div);
        return div;
    })();
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

function updateFavCount() {
    const favorites = JSON.parse(localStorage.getItem("favorites")) || [];
    const count = favorites.length;
    const favSpan = document.getElementById('favCount');
    if (favSpan) {
        favSpan.textContent = count;
        favSpan.classList.toggle('hidden', count === 0);
    }
}

// Initialisation

// Gestion des onglets
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        document.querySelectorAll('.category-section').forEach(section => section.style.display = 'none');
        if (cat === 'all') {
            document.querySelectorAll('.category-section').forEach(section => section.style.display = 'block');
        } else if (cat === 'homme') {
            document.getElementById('hommeProducts').style.display = 'block';
        } else if (cat === 'femme') {
            document.getElementById('femmeProducts').style.display = 'block';
        } else if (cat === 'enfant') {
            document.getElementById('enfantProducts').style.display = 'block';
        }
        document.querySelectorAll('.tab-btn').forEach(t => {
            t.classList.remove('text-green-700', 'border-green-700');
            t.classList.add('text-gray-600');
        });
        btn.classList.add('text-green-700', 'border-green-700');
        btn.classList.remove('text-gray-600');
    });
});

// Menu mobile
document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
    const nav = document.querySelector('header .hidden.md\\:flex');
    nav?.classList.toggle('hidden');
    nav?.classList.toggle('flex');
    nav?.classList.toggle('flex-col');
    nav?.classList.toggle('absolute');
    nav?.classList.toggle('top-16');
    nav?.classList.toggle('left-0');
    nav?.classList.toggle('w-full');
    nav?.classList.toggle('bg-green-700');
    nav?.classList.toggle('p-4');
    nav?.classList.toggle('gap-3');
});
