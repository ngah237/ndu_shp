<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
</head>
<body class="bg-gray-900">

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-xl shadow-xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-4xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Espace Administrateur</h1>
            <p class="text-gray-500 text-sm mt-2">Connectez-vous pour gérer votre boutique</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-3 text-gray-400"></i>
                    <input type="email" id="email" placeholder="admin@modestyle.com" 
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Mot de passe</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input type="password" id="password" placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-green-700 text-white py-2 rounded-lg font-semibold hover:bg-green-800 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-red-600 text-center text-sm hidden"></div>
        
        <div class="mt-6 text-center text-gray-500 text-sm">
            <p>Accès réservé aux administrateurs</p>
            <a href="../../index.html" class="text-green-600 hover:underline">← Retour à la boutique</a>
        </div>
    </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.querySelector('button[type="submit"]');
    
    if (!email || !password) {
        errorMsg.textContent = 'Veuillez remplir tous les champs';
        errorMsg.classList.remove('hidden');
        return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Connexion...';
    
    try {
        const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            if (data.role === 'admin') {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminInfo', JSON.stringify(data));
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = 'Accès non autorisé. Compte non administrateur.';
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Se connecter';
            }
        } else {
            errorMsg.textContent = data.message || 'Email ou mot de passe incorrect';
            errorMsg.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Se connecter';
        }
    } catch (error) {
        errorMsg.textContent = 'Erreur de connexion au serveur. Vérifiez que le backend est démarré.';
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Se connecter';
    }
});
</script>
</body>
</html>
