<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaussures - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold">ModeStyle</a>
            <div class="flex items-center gap-4">
                <a href="../index.html" class="hover:text-green-200">Accueil</a>
                <a href="cart.html" class="hover:text-green-200 relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
                <a href="favoris.html" class="hover:text-green-200">
                    <i class="far fa-heart text-xl"></i>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">👟 Chaussures</h1>
    
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <select id="genderFilter" class="px-3 py-2 border rounded-lg">
                <option value="all">Tous</option>
                <option value="homme">Homme</option>
                <option value="femme">Femme</option>
                <option value="enfant">Enfant</option>
            </select>
            <input type="text" id="searchFilter" placeholder="Rechercher..." class="px-3 py-2 border rounded-lg flex-1">
            <button id="resetFilters" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Réinitialiser</button>
        </div>
    </div>
    
    <div id="productsContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <div class="col-span-full text-center py-12 text-gray-500">Chargement...</div>
    </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
const API_URL = 'http://localhost:5000/api';
let allProducts = [];

async function loadProducts() {
    try {
        const res = await fetch(`${API_URL}/products`);
        allProducts = await res.json();
        applyFilters();
    } catch (error) {
        document.getElementById('productsContainer').innerHTML = '<div class="col-span-full text-center py-12 text-red-500">Erreur de chargement</div>';
    }
}

function applyFilters() {
    const gender = document.getElementById('genderFilter').value;
    const search = document.getElementById('searchFilter').value.toLowerCase();
    let filtered = allProducts.filter(p => p.category === 'chaussures');
    if (gender !== 'all') filtered = filtered.filter(p => p.gender === gender);
    if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
    displayProducts(filtered);
}

function displayProducts(products) {
    const container = document.getElementById('productsContainer');
    if (!products.length) {
        container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">Aucune chaussure trouvée</div>';
        return;
    }
    container.innerHTML = products.map(p => `
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <a href="product-details.html?id=${p._id}">
                <img src="${p.image}" class="w-full h-40 object-cover">
            </a>
            <div class="p-3">
                <h3 class="font-semibold truncate">${p.name}</h3>
                <p class="text-green-600 font-bold">${p.price.toLocaleString()} FCFA</p>
                <button onclick="addToCartUI('${p._id}', '${p.name}', ${p.price}, 1, '', '', '${p.image}')" class="mt-2 w-full bg-green-600 text-white py-1 rounded">Acheter</button>
            </div>
        </div>
    `).join('');
}

document.getElementById('genderFilter').addEventListener('change', applyFilters);
document.getElementById('searchFilter').addEventListener('input', applyFilters);
document.getElementById('resetFilters').addEventListener('click', () => {
    document.getElementById('genderFilter').value = 'all';
    document.getElementById('searchFilter').value = '';
    applyFilters();
});
loadProducts();
</script>
</body>
</html>
