<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail produit - ModeStyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold">ModeStyle</a>
            <div class="flex items-center gap-4">
                <a href="../index.html" class="hover:text-green-200">
                    <i class="fas fa-home"></i> Accueil
                </a>
                <a href="cart.html" class="hover:text-green-200 relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <div id="productContainer" class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-8 text-center">
            <i class="fas fa-spinner fa-spin text-3xl text-green-600"></i>
            <p class="mt-2">Chargement du produit...</p>
        </div>
    </div>
</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
let currentProduct = null;

// Récupérer l'ID du produit depuis l'URL
function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function loadProduct() {
    const productId = getProductId();
    if (!productId) {
        document.getElementById('productContainer').innerHTML = `
            <div class="p-8 text-center text-red-500">
                <i class="fas fa-exclamation-triangle text-5xl mb-3 block"></i>
                <p>Produit non trouvé</p>
                <a href="../index.html" class="mt-4 inline-block bg-green-600 text-white px-4 py-2 rounded-lg">Retour à l'accueil</a>
            </div>
        `;
        return;
    }
    
    try {
        const product = await getProductById(productId);
        currentProduct = product;
        displayProduct(product);
    } catch (error) {
        document.getElementById('productContainer').innerHTML = `
            <div class="p-8 text-center text-red-500">
                <i class="fas fa-exclamation-triangle text-5xl mb-3 block"></i>
                <p>Erreur lors du chargement du produit</p>
                <button onclick="loadProduct()" class="mt-4 bg-green-600 text-white px-4 py-2 rounded-lg">Réessayer</button>
            </div>
        `;
    }
}

function displayProduct(product) {
    const container = document.getElementById('productContainer');
    
    container.innerHTML = `
        <div class="flex flex-col md:flex-row">
            <!-- Image -->
            <div class="md:w-1/2 p-6">
                <img src="${product.image}" alt="${product.name}" class="w-full rounded-lg shadow-md">
                ${product.images && product.images.length > 0 ? `
                    <div class="flex gap-2 mt-4">
                        ${product.images.map(img => `
                            <img src="${img}" class="w-16 h-16 object-cover rounded cursor-pointer hover:opacity-80" onclick="changeMainImage('${img}')">
                        `).join('')}
                    </div>
                ` : ''}
            </div>
            
            <!-- Infos -->
            <div class="md:w-1/2 p-6">
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">${product.name}</h1>
                
                <div class="flex items-center gap-2 mt-2">
                    <div class="flex text-yellow-400">
                        ${Array(5).fill(0).map((_, i) => `
                            <i class="fas fa-star ${i < Math.floor(product.rating) ? 'text-yellow-400' : 'text-gray-300'} text-sm"></i>
                        `).join('')}
                    </div>
                    <span class="text-sm text-gray-500">(${product.reviews || 0} avis)</span>
                </div>
                
                <div class="mt-4">
                    ${product.oldPrice ? `
                        <span class="text-gray-400 line-through text-lg">${product.oldPrice.toLocaleString()} FCFA</span>
                        <span class="text-green-600 text-3xl font-bold ml-2">${product.price.toLocaleString()} FCFA</span>
                        <span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full ml-2">-${Math.round((1 - product.price/product.oldPrice) * 100)}%</span>
                    ` : `
                        <span class="text-green-600 text-3xl font-bold">${product.price.toLocaleString()} FCFA</span>
                    `}
                </div>
                
                <div class="mt-4">
                    <p class="text-gray-600">${product.description}</p>
                </div>
                
                ${product.sizes && product.sizes.length > 0 ? `
                    <div class="mt-4">
                        <label class="block text-gray-700 font-semibold mb-2">Taille</label>
                        <div class="flex gap-2 flex-wrap">
                            ${product.sizes.map(size => `
                                <button onclick="selectSize('${size}')" class="size-btn px-4 py-2 border rounded-lg hover:border-green-500 transition">
                                    ${size}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                ${product.colors && product.colors.length > 0 ? `
                    <div class="mt-4">
                        <label class="block text-gray-700 font-semibold mb-2">Couleur</label>
                        <div class="flex gap-2 flex-wrap">
                            ${product.colors.map(color => `
                                <button onclick="selectColor('${color}')" class="color-btn px-4 py-2 border rounded-lg hover:border-green-500 transition">
                                    ${color}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                <div class="mt-4">
                    <label class="block text-gray-700 font-semibold mb-2">Quantité</label>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQuantity(-1)" class="w-10 h-10 bg-gray-200 rounded-full hover:bg-gray-300">
                            <i class="fas fa-minus"></i>
                        </button>
                        <span id="quantity" class="text-xl font-semibold w-12 text-center">1</span>
                        <button onclick="updateQuantity(1)" class="w-10 h-10 bg-gray-200 rounded-full hover:bg-gray-300">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mt-6 flex gap-3">
                    <button onclick="addToCartHandler()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                        <i class="fas fa-shopping-cart"></i> Ajouter au panier
                    </button>
                    <button onclick="toggleFavoriteHandler()" id="favoriteBtn" class="w-12 h-12 border rounded-lg hover:border-red-500 transition">
                        <i class="far fa-heart text-xl"></i>
                    </button>
                </div>
                
                <div class="mt-6 pt-4 border-t">
                    <h3 class="font-semibold mb-2">Caractéristiques</h3>
                    <ul class="text-sm text-gray-600 space-y-1">
                        <li><i class="fas fa-tag text-green-600 mr-2"></i> Catégorie: ${product.category}</li>
                        <li><i class="fas fa-box text-green-600 mr-2"></i> Stock: ${product.stock > 0 ? `${product.stock} disponibles` : 'Rupture de stock'}</li>
                        ${product.isNew ? '<li><i class="fas fa-star text-yellow-500 mr-2"></i> Nouveau produit</li>' : ''}
                        ${product.isPromo ? '<li><i class="fas fa-tag text-red-500 mr-2"></i> En promotion</li>' : ''}
                    </ul>
                </div>
            </div>
        </div>
        
        <!-- Section avis -->
        <div class="border-t p-6">
            <h2 class="text-xl font-bold mb-4">Avis clients</h2>
            <div class="text-center py-8 text-gray-500">
                <i class="fas fa-comment-dots text-3xl mb-2 block"></i>
                <p>Soyez le premier à donner votre avis sur ce produit</p>
                <button class="mt-3 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg">Donner mon avis</button>
            </div>
        </div>
    </div>
    `;
    
    checkIsFavorite();
}

let selectedSize = '';
let selectedColor = '';
let currentQuantity = 1;

function updateQuantity(delta) {
    currentQuantity = Math.max(1, Math.min(99, currentQuantity + delta));
    document.getElementById('quantity').textContent = currentQuantity;
}

function selectSize(size) {
    selectedSize = size;
    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.classList.remove('border-green-500', 'bg-green-50');
        if (btn.textContent === size) {
            btn.classList.add('border-green-500', 'bg-green-50');
        }
    });
}

function selectColor(color) {
    selectedColor = color;
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.remove('border-green-500', 'bg-green-50');
        if (btn.textContent === color) {
            btn.classList.add('border-green-500', 'bg-green-50');
        }
    });
}

function changeMainImage(imageUrl) {
    const mainImg = document.querySelector('#productContainer img:first-of-type');
    if (mainImg) mainImg.src = imageUrl;
}

async function addToCartHandler() {
    if (!currentProduct) return;
    
    const success = await addToCartUI(
        currentProduct._id,
        currentProduct.name,
        currentProduct.price,
        currentQuantity,
        selectedSize,
        selectedColor,
        currentProduct.image
    );
    
    if (success) {
        // Réinitialiser la quantité
        currentQuantity = 1;
        document.getElementById('quantity').textContent = '1';
    }
}

async function toggleFavoriteHandler() {
    if (!isLoggedIn()) {
        showToast('Veuillez vous connecter', true);
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 1500);
        return;
    }
    
    try {
        const result = await toggleFavorite(currentProduct._id);
        const btn = document.getElementById('favoriteBtn');
        const icon = btn.querySelector('i');
        
        if (result.isFavorite) {
            icon.classList.remove('far');
            icon.classList.add('fas');
            btn.classList.add('text-red-500');
            showToast('Ajouté aux favoris');
        } else {
            icon.classList.remove('fas');
            icon.classList.add('far');
            btn.classList.remove('text-red-500');
            showToast('Retiré des favoris');
        }
    } catch (error) {
        showToast(error.message, true);
    }
}

async function checkIsFavorite() {
    if (!isLoggedIn() || !currentProduct) return;
    
    try {
        const result = await checkFavorite(currentProduct._id);
        const btn = document.getElementById('favoriteBtn');
        const icon = btn.querySelector('i');
        
        if (result.isFavorite) {
            icon.classList.remove('far');
            icon.classList.add('fas');
            btn.classList.add('text-red-500');
        }
    } catch (error) {
        console.error('Erreur:', error);
    }
}

function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `fixed bottom-4 right-4 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-4 py-2 rounded-lg shadow-lg text-sm toast-slide`;
    toast.classList.remove('hidden');
    setTimeout(() => {
        toast.classList.add('hidden');
    }, 3000);
}

// Initialisation
document.addEventListener('DOMContentLoaded', () => {
    loadProduct();
    if (isLoggedIn()) {
        loadCart();
    }
});
</script>
</body>
</html>
