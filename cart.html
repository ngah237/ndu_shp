<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Panier - ModeStyle</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- bibliothèque PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.toast-slide {
    animation: slideInRight 0.3s ease-out;
}
@keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
</style>

</head>

<body class="bg-gray-100">

<header class="bg-green-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold">ModeStyle</a>
            <nav class="flex gap-6">
                <a href="index.html" class="hover:text-green-200">Accueil</a>
                <a href="cart.html" class="text-yellow-300 font-semibold">Panier</a>
                <a href="pages/favoris.html" class="hover:text-green-200">Favoris</a>
            </nav>
            <div class="flex items-center gap-4">
                <a href="pages/login.html" class="hover:text-green-200">
                    <i class="fas fa-user-circle text-2xl"></i>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">Votre Panier</h1>

    <div class="flex flex-col lg:flex-row gap-8">

        <!-- Liste des produits -->
        <div class="lg:w-2/3">
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-green-700 text-white">
                            <tr>
                                <th class="p-3 text-left">Produit</th>
                                <th class="p-3 text-center">Prix</th>
                                <th class="p-3 text-center">Quantité</th>
                                <th class="p-3 text-center">Total</th>
                                <th class="p-3 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartBody">
                            <tr>
                                <td colspan="5" class="text-center py-8 text-gray-500">
                                    <i class="fas fa-shopping-cart text-4xl mb-2 block"></i>
                                    Votre panier est vide
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Résumé et paiement -->
        <div class="lg:w-1/3">
            <div class="bg-white rounded-xl shadow-md p-6 sticky top-24">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Résumé de la commande</h2>
                
                <div class="space-y-2 border-b pb-3">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Sous-total</span>
                        <span id="subtotal" class="font-semibold">0 FCFA</span>
                    </div>
                    <div class="flex justify-between text-green-600">
                        <span>Livraison</span>
                        <span class="font-semibold">Gratuite</span>
                    </div>
                </div>
                
                <div class="flex justify-between text-xl font-bold mt-3">
                    <span>Total</span>
                    <span id="grandTotal" class="text-green-700">0 FCFA</span>
                </div>
                
                <button onclick="openPaymentModal()" id="checkoutBtn" 
                        class="w-full bg-green-700 text-white py-3 rounded-lg font-semibold mt-4 hover:bg-green-800 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-credit-card"></i> Procéder au paiement
                </button>
                
                <a href="index.html" class="block text-center text-green-600 mt-3 hover:underline">
                    <i class="fas fa-arrow-left"></i> Continuer mes achats
                </a>
            </div>
        </div>
    </div>
</main>

<!-- Modal de paiement -->
<div id="paymentModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-xl max-w-md w-full mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-gray-800">Paiement & Livraison</h2>
            <button onclick="closePaymentModal()" class="text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <form id="paymentForm">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Méthode de paiement</label>
                <select id="paymentMethod" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">Choisir</option>
                    <option value="orange">Orange Money</option>
                    <option value="mtn">MTN Mobile Money</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Numéro de téléphone</label>
                <input type="tel" id="phone" placeholder="6XXXXXXXX" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Lieu de livraison</label>
                <input type="text" id="deliveryAddress" placeholder="Ville / Quartier" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <button type="submit" class="w-full bg-green-700 text-white py-3 rounded-lg font-semibold hover:bg-green-800 transition">
                <i class="fas fa-check-circle"></i> Confirmer et payer
            </button>
        </form>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm toast-slide"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartBody = document.getElementById("cartBody");
const grandTotalElem = document.getElementById("grandTotal");
const subtotalElem = document.getElementById("subtotal");

function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `fixed bottom-4 right-4 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-4 py-2 rounded-lg shadow-lg text-sm toast-slide`;
    toast.classList.remove('hidden');
    setTimeout(() => {
        toast.classList.add('hidden');
    }, 3000);
}

function renderCart() {
    cartBody.innerHTML = "";
    let grandTotal = 0;

    if (cart.length === 0) {
        cartBody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center py-8 text-gray-500">
                    <i class="fas fa-shopping-cart text-4xl mb-2 block"></i>
                    Votre panier est vide
                </td>
            </tr>
        `;
        document.getElementById('checkoutBtn').disabled = true;
        grandTotalElem.textContent = "0";
        subtotalElem.textContent = "0 FCFA";
        return;
    }

    document.getElementById('checkoutBtn').disabled = false;

    cart.forEach((item, index) => {
        let total = item.price * item.qty;
        grandTotal += total;

        let row = document.createElement("tr");
        row.className = "border-b hover:bg-gray-50";
        row.innerHTML = `
            <td class="p-3" data-label="Produit">
                <div class="flex items-center gap-3">
                    ${item.image ? `<img src="${item.image}" class="w-12 h-12 object-cover rounded">` : '<div class="w-12 h-12 bg-gray-200 rounded flex items-center justify-center"><i class="fas fa-box text-gray-400"></i></div>'}
                    <span class="font-semibold">${item.name}</span>
                </div>
            </td>
            <td class="p-3 text-center" data-label="Prix">${item.price.toLocaleString()} FCFA</td>
            <td class="p-3 text-center" data-label="Quantité">
                <div class="flex items-center justify-center gap-2">
                    <button onclick="updateQuantity(${index}, ${item.qty - 1})" 
                            class="w-8 h-8 bg-gray-200 rounded-full hover:bg-gray-300 ${item.qty <= 1 ? 'opacity-50 cursor-not-allowed' : ''}"
                            ${item.qty <= 1 ? 'disabled' : ''}>
                        <i class="fas fa-minus text-xs"></i>
                    </button>
                    <span class="w-8 text-center font-semibold">${item.qty}</span>
                    <button onclick="updateQuantity(${index}, ${item.qty + 1})" 
                            class="w-8 h-8 bg-gray-200 rounded-full hover:bg-gray-300">
                        <i class="fas fa-plus text-xs"></i>
                    </button>
                </div>
            </td>
            <td class="p-3 text-center font-semibold" data-label="Total">${total.toLocaleString()} FCFA</td>
            <td class="p-3 text-center" data-label="Action">
                <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </td>
        `;
        cartBody.appendChild(row);
    });

    grandTotalElem.textContent = grandTotal.toLocaleString();
    subtotalElem.textContent = grandTotal.toLocaleString() + " FCFA";
}

function updateQuantity(index, newQty) {
    if (newQty < 1) return;
    if (newQty > 99) {
        showToast("Quantité maximale: 99", true);
        return;
    }
    cart[index].qty = newQty;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    showToast("Produit retiré du panier");
}

function openPaymentModal() {
    if (cart.length === 0) {
        showToast("Votre panier est vide", true);
        return;
    }
    document.getElementById('paymentModal').classList.add('flex');
    document.getElementById('paymentModal').classList.remove('hidden');
}

function closePaymentModal() {
    document.getElementById('paymentModal').classList.add('hidden');
    document.getElementById('paymentModal').classList.remove('flex');
}

document.getElementById("paymentForm").addEventListener("submit", function(e) {
    e.preventDefault();

    if (cart.length === 0) {
        showToast("Votre panier est vide", true);
        return;
    }

    let method = document.getElementById("paymentMethod").value;
    let phone = document.getElementById("phone").value;
    let delivery = document.getElementById("deliveryAddress").value;
    let totalAmount = grandTotalElem.textContent.replace(/\s/g, '');

    if (!method || !phone || !delivery) {
        showToast("Veuillez remplir tous les champs", true);
        return;
    }

    // Validation du numéro de téléphone
    const phoneRegex = /^[6][0-9]{8}$/;
    if (!phoneRegex.test(phone)) {
        showToast("Numéro invalide (ex: 612345678)", true);
        return;
    }

    showToast("Paiement effectué avec succès !");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Reçu de Paiement - ModeStyle", 105, 20, null, null, "center");

    doc.setFontSize(12);
    doc.text(`Méthode: ${method === 'orange' ? 'Orange Money' : 'MTN Mobile Money'}`, 20, 40);
    doc.text(`Téléphone: ${phone}`, 20, 50);
    doc.text(`Livraison: ${delivery}`, 20, 60);
    doc.text(`Total payé: ${totalAmount} FCFA`, 20, 70);
    doc.text("Date: " + new Date().toLocaleDateString(), 20, 80);

    doc.text("Produits :", 20, 95);
    let y = 105;
    cart.forEach(item => {
        doc.text(`${item.name} - ${item.price.toLocaleString()} x ${item.qty} = ${(item.price * item.qty).toLocaleString()} FCFA`, 25, y);
        y += 10;
        if (y > 270) {
            doc.addPage();
            y = 20;
        }
    });

    doc.save("recu_paiement.pdf");

    localStorage.removeItem("cart");
    cart = [];
    renderCart();
    closePaymentModal();

    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
});

renderCart();
</script>

</body>
</html>
